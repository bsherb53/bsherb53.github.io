<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Divine Monarchs Hex Map by @GingerKing</title>
    <meta name="description" content="Divine Monarchs Hex Map by @GingerKing">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  </head>
  <body>
    <div ng-app="myApp" ng-controller="myCtrl">
      <ul id="hexGrid">
        <li class="hex" ng-repeat="t in ::tiles" ng-click="select(t.number)">
          <div class="hexIn" >
            <a class="hexLink" href="#">
              <img src="{{t.src}}" alt="{{t.name}}" />
              <h1>{{t.name}}</h1>
              <p>{{t.biome}}
                {{t.type}}
                {{t.weather}}
                {{t.rating}}
              {{t.number}}</p>
            </a>
          </div>
        </li>
      </ul>
      <div ng-if="selected != 'undefined'">
      {{selected}}</div>
    </div>
  </body>
</html>
<script src="scripts.js"></script>
