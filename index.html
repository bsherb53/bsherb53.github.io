<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <!-- <meta http-equiv="x-ua-compatible" content="ie=edge"> -->
  <title>Divine Monarchs Hex Map by @GingerKing</title>
  <meta name="description" content="Divine Monarchs Hex Map by @GingerKing">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1"> -->
  <link rel="stylesheet" type="text/css" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
  <!-- <script type="text/javascript" src="data.json"></script> -->
  <!-- <script type="text/javascript" src="firebaseconfig.js"></script> -->
  <script src="https://apis.google.com/js/api.js"></script>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
  <div ng-app="myApp" ng-controller="myCtrl">
    <div class="header">Version {{version}} made by Ginger King</div>
    <!-- <div ng-init="FunCall()" class="header">Version {{version}} made by Ginger King</div> -->
    <ul id="hexGrid">
      <li class="hex" ng-repeat="t in tiles" ng-click="select($index)">
        <div class="hexIn">
          <a class="hexLink" style="background:#{{t.owner.hex}};" href="#">
            <img src="" alt="" />
          </a>
        </div>
      </li>
    </ul>
    <div ng-if="selected != undefined && loading != true">
      <div class="selected-box">
        <div class="line">
          <div class="left">Tile {{selected.name}}</div>
          <div id="id" class="right">{{selected.id}}</div>
        </div>
        <div class="line">
          <div class="left">Owner:</div>
          <div class="right"><select ng-model="selected.owner"
              ng-options="item as item.name for item in owners"></select></div>
        </div>

        <div class="line">
          <div class="left">Biome:</div>
          <div class="right"><select ng-model="selected.biome"
              ng-options="key as value for (key, value) in biomes"></select></div>
        </div>
        <div class="line">
          <div class="left">Weather:</div>
          <div class="right"><select ng-model="selected.weather"
              ng-options="key as value for (key, value) in weathers"></select></div>
        </div>
        <div class="line">
          <div class="left">Type:</div>
          <div class="right"><select ng-model="selected.type"
              ng-options="key as value for (key, value) in types"></select></div>
        </div>
        <div class="line">
          <div class="left">CR:</div>
          <div class="right"><select ng-model="selected.rating"
              ng-options="key as value for (key, value) in ratings"></select></div>
        </div>
        <div class="line">
          <p class="button" ng-click="close()">CLOSE</p>
        </div>
      </div>
    </div>
    <!-- <div class="button" ng-if="admin" ng-click="clearCache()">Clear Data</div> -->
  </div>
  <script src="https://www.gstatic.com/firebasejs/7.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.12.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.12.0/firebase-analytics.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.12.0/firebase-database.js"></script>
  <script src="scripts.js" defer></script>
</body>

</html>
