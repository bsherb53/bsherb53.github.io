<html>

<head>
    <script src="https://use.fontawesome.com/97e407aae1.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="scripts.js"></script>
</head>

<body class="body">
    <div ng-app="myApp" ng-controller="mainCtrl">
        <div ng-view></div>

        {{page}}
        <div ng-if="page == 1" >Test</div>
        <div ng-if="page == 2" ng-include="'mouse.html'"></div>
        <div ng-if="page == 3" ng-include="'hex.html'"></div>
        <div ng-click="page = page + 1">Next</div>
        <div ng-click="page = page - 1">Previous</div>
    </div>
</body>

</html>
